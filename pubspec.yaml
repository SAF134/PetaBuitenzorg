name: peta_buitenzorg
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_staggered_animations: ^1.1.1
  geolocator: ^14.0.2
  google_fonts: ^8.0.2
  http: ^1.6.0
  intl: ^0.20.2
  latlong2: ^0.9.1
  shimmer: ^3.0.0
  sliver_tools: ^0.2.12
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/hotel.json
    - assets/data/rs.json
    - assets/data/mall.json
    - assets/data/spbu.json
    - assets/data/bogor.json
    - assets/images/logo/
    - assets/images/hotel/
    - assets/images/rs/
    - assets/images/mall/
    - assets/images/spbu/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo/Logo_PetaBuitenzorg.png"
  min_sdk_android: 21
